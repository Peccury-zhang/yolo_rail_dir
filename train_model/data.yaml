# YOLO OBB 数据集配置 (导轨方向检测)
# path 为数据集根目录, train/val 为相对于 path 的图片目录。
# YOLO 会自动把路径中的 images 替换为 labels 去寻找标签文件。

path: C:/Users/15401/Desktop/yolo_rail_dir/train_model
train: train_data/images
val: valid_data/images

# 类别 (索引必须与 transform.py 中 classes='up,down,left,right' 一致)
names:
  0: up
  1: down
  2: left
  3: right
